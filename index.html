<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motouber</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }

        .hero {
            padding: 40px;
            text-align: center;
            background: white;
        }

        .hero h1 {
            font-size: 32px;
        }

        .hero p {
            color: gray;
        }

        .boton {
            background: black;
            color: white;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        .contenedor {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
            flex-wrap: wrap;
        }

        .tarjeta {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px #ccc;
            text-align: center;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        🏍️ Motouber
    </header>

    <section class="hero">
        <h1>Muévete rápido por la ciudad</h1>
        <p>Solicita tu Motouber en segundos</p>
        <button class="boton">Solicitar viaje</button>
    </section>

    <section class="contenedor">

        <div class="tarjeta">
            <h2>David</h2>
            <p>💻 Desarrollador</p>
            <p>Crea la plataforma</p>
        </div>

        <div class="tarjeta">
            <h2>María Paula</h2>
            <p>🏍️ Conductora</p>
            <p>Rápida y segura</p>
        </div>

    </section>

    <footer>
        © 2026 Motouber
    </footer>

</body>
</html>
