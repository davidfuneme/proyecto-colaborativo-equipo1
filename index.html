<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moto Uber GOD - Pro Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
    body { margin: 0; overflow: hidden; background: #050505; font-family: 'Inter', sans-serif; }
    canvas { display: block; }
    .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
    }
    .ui-container {
        position: absolute; top: 10%; width: 100%; text-align: center; z-index: 10;
    }
    .neon-text {
        color: #fff;
        text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff, 0 0 40px #00f2ff;
        letter-spacing: 5px;
        font-weight: 900;
        text-transform: uppercase;
    }
    .btn-god {
        pointer-events: auto;
        background: linear-gradient(45deg, #00f2ff, #7000ff);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        transition: all 0.3s ease;
        border: none;
        cursor: pointer;
    }
    .btn-god:hover {
        transform: scale(1.1) rotate(-2deg);
        box-shadow: 0 0 40px rgba(112, 0, 255, 0.8);
    }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="ui-container">
    <h1 class="text-7xl neon-text mb-2">MOTO UBER GOD</h1>
    <p class="text-cyan-400 font-mono tracking-widest">VELOCIDAD TERMINAL // FUSAGASUGÁ 2026</p>
</div>

<div class="absolute bottom-12 w-full flex justify-center z-20">
    <button class="btn-god text-white px-12 py-4 rounded-full font-black text-xl italic">
        INICIAR VIAJE ⚡
    </button>
</div>

<script>
// --- CONFIGURACIÓN BASE ---
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 1, 15);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// --- CARRETERA (GRID) ---
const gridHelper = new THREE.GridHelper(100, 40, 0x00f2ff, 0x7000ff);
gridHelper.position.y = -1;
scene.add(gridHelper);

// --- LA MOTO (DISEÑO MÁS AGRESIVO) ---
const motoGroup = new THREE.Group();

// Cuerpo principal
const bodyGeom = new THREE.BoxGeometry(0.8, 0.5, 2.5);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1, roughness: 0.1 });
const body = new THREE.Mesh(bodyGeom, bodyMat);
motoGroup.add(body);

// Luz frontal (Neon)
const lightGeom = new THREE.BoxGeometry(0.85, 0.1, 0.1);
const lightMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
const headlight = new THREE.Mesh(lightGeom, lightMat);
headlight.position.set(0, 0.1, 1.25);
motoGroup.add(headlight);

// Estela de luz trasera
const tailGeom = new THREE.BoxGeometry(0.2, 0.05, 3);
const tailMat = new THREE.MeshBasicMaterial({ color: 0x7000ff, transparent: true, opacity: 0.5 });
const tail = new THREE.Mesh(tailGeom, tailMat);
tail.position.set(0, -0.2, -2);
motoGroup.add(tail);

scene.add(motoGroup);

// --- LUCES ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);

const blueLight = new THREE.PointLight(0x00f2ff, 2, 10);
blueLight.position.set(2, 2, 2);
scene.add(blueLight);

const purpleLight = new THREE.PointLight(0x7000ff, 2, 10);
purpleLight.position.set(-2, 2, -2);
scene.add(purpleLight);

// --- PARTÍCULAS DE VELOCIDAD ---
const starGeometry = new THREE.BufferGeometry();
const starCount = 500;
const posArray = new Float32Array(starCount * 3);

for(let i = 0; i < starCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 20;
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
const stars = new THREE.Points(starGeometry, starMat);
scene.add(stars);

camera.position.set(0, 1, 5);

// --- INTERACTIVIDAD ---
let mouseX = 0;
window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) - 0.5;
});

// --- ANIMACIÓN ---
function animate() {
    requestAnimationFrame(animate);

    const time = Date.now() * 0.001;

    // Movimiento de la carretera
    gridHelper.position.z = (time * 10) % 2.5;

    // Movimiento de estrellas
    stars.position.z += 0.2;
    if(stars.position.z > 5) stars.position.z = 0;

    // Suavizado de movimiento de la moto
    motoGroup.position.x = THREE.MathUtils.lerp(motoGroup.position.x, mouseX * 4, 0.1);
    motoGroup.rotation.z = THREE.MathUtils.lerp(motoGroup.rotation.z, -mouseX * 0.8, 0.1);
    motoGroup.rotation.y = THREE.MathUtils.lerp(motoGroup.rotation.y, mouseX * 0.5, 0.1);
    
    // Vibración de motor
    motoGroup.position.y = Math.sin(time * 20) * 0.02;

    renderer.render(scene, camera);
}

animate();

// --- RESPONSIVE ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Efecto de click
document.querySelector('.btn-god').addEventListener('click', () => {
    gsap.to(camera.position, { z: 2, duration: 1, ease: "power4.inOut" });
    gsap.to(camera.position, { z: 5, delay: 1, duration: 2, ease: "elastic.out" });
});
</script>
</body>
</html>
