<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKD Cyber-Ride | Uber Moto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
            pointer-events: none;
        }
        .btn-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        .nkd-btn {
            background: transparent;
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
        .nkd-btn:hover {
            background: #ff0055;
            color: white;
            box-shadow: 0 0 30px #ff0055;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 class="text-2xl font-black">NKD 125 // PROTOCOLO UBER</h1>
        <p class="text-xs opacity-80">ESTADO: BUSCANDO PASAJERO...</p>
        <div class="mt-2 h-1 w-32 bg-cyan-500 shadow-[0_0_10px_#00f2ff]"></div>
    </div>

    <div class="btn-container">
        <button class="nkd-btn">SOLICITAR SERVICIO</button>
    </div>

    <script>
        let scene, camera, renderer, grid, bikeGroup;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x050505, 5, 15);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luz de ambiente
            const light = new THREE.PointLight(0x00f2ff, 1, 10);
            light.position.set(0, 2, 2);
            scene.add(light);

            // GRID (Carretera neón)
            grid = new THREE.GridHelper(100, 50, 0xff0055, 0x222222);
            grid.position.y = -1;
            scene.add(grid);

            // GRUPO DE LA MOTO
            bikeGroup = new THREE.Group();
            
            // Representación del Holograma (Mujer en NKD)
            // Creamos un plano con una silueta
            const geometry = new THREE.PlaneGeometry(2, 2);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00f2ff,
                transparent: true,
                opacity: 0.8,
                side: THREE.DoubleSide,
                // Simulamos la silueta con wireframe para que parezca digital
                wireframe: true 
            });
            const hologram = new THREE.Mesh(geometry, material);
            hologram.position.y = 0.2;
            bikeGroup.add(hologram);

            // "Luz de piso" de la moto
            const floorLight = new THREE.Mesh(
                new THREE.CircleGeometry(0.8, 32),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.2 })
            );
            floorLight.rotation.x = -Math.PI / 2;
            floorLight.position.y = -0.99;
            bikeGroup.add(floorLight);

            scene.add(bikeGroup);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            // Efecto de movimiento infinito
            grid.position.z += 0.1;
            if (grid.position.z > 2) grid.position.z = 0;

            // Balanceo de la moto (simulando conducción)
            bikeGroup.rotation.z = Math.sin(Date.now() * 0.002) * 0.05;
            bikeGroup.position.y = Math.sin(Date.now() * 0.004) * 0.02;

            renderer.render(scene, camera);
        }

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Control con el mouse
        window.addEventListener('mousemove', (e) => {
            let x = (e.clientX / window.innerWidth) - 0.5;
            bikeGroup.position.x = x * 2;
            bikeGroup.rotation.y = x * 0.5;
        });

        init();
    </script>
</body>
</html>
