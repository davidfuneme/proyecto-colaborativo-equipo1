<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKD Cyber-Ride | Uber Moto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
            pointer-events: none;
        }
        .btn-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        .nkd-btn {
            background: transparent;
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 12px 30px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        }
        .nkd-btn:hover {
            background: #ff0055;
            color: white;
            box-shadow: 0 0 30px #ff0055;
        }
    </style>
</head>
<body>
    <h1>Nuestro Equipo</h1>

    <div class="contenedor">

        <div style="background:white; padding:20px; border-radius:10px; width:200px; box-shadow: 2px 2px 8px #ccc;">
            <h2>David Santiago Funeme Gavilán</h2>
            <p>💻 Habilidad: Desarrollo Web</p>
        </div>

        <div style="background:white; padding:20px; border-radius:10px; width:200px; box-shadow: 2px 2px 8px #ccc;">
            <h2>María Paula Quevedo</h2>
            <p>🏍️ Rol: Conductora Motouber</p>
            <p>⚡ Habilidad: Conducción rápida y segura</p>
        </div>

    </div>

</body>
</html>
